<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe Vibe Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Cafe Intelligence</p>
      <h1>ESPRESSO YOURSELF</h1>
      <p class="sub">Find cafes by vibe, workability, sunlight and live seat status.</p>
    </div>
    <div class="hero-actions">
      <button id="liveLocationBtn" class="btn alt">Use My Live Location</button>
      <input id="address" type="text" placeholder="Search place (e.g. FC Road Pune)" />
      <button id="locateAddressBtn" class="btn">Use Address</button>
    </div>
  </header>

  <main>
    <aside class="controls">
      <h2>Search Controls</h2>
      <div class="dataset-pick">
        <label>Dataset Method
          <select id="source">
            <option value="csv">CSV Prototype</option>
            <option value="xlsx">XLSX Prototype</option>
          </select>
        </label>
      </div>
      <div class="onboarding-card">
        <h3>User Onboarding (Permanent)</h3>
        <label>Name <input id="userName" type="text" placeholder="Your name" /></label>
        <label>Age Group
          <select id="ageGroup">
            <option value="">Select</option>
            <option>Student</option>
            <option>Working Professional</option>
            <option>Other</option>
          </select>
        </label>
        <label>Occupation <input id="occupation" type="text" placeholder="Student, Engineer, Designer..." /></label>
        <label>Default Budget Range
          <select id="defaultBudgetRange">
            <option>Low</option>
            <option selected>Medium</option>
            <option>High</option>
          </select>
        </label>
        <label>Preferred Cafe Type
          <select id="preferredCafeType">
            <option>Quiet / Work-friendly</option>
            <option>Social / Hangout</option>
            <option>Premium / Aesthetic</option>
          </select>
        </label>
        <label>Preferred Distance Range
          <select id="preferredDistanceKm">
            <option value="1">1 km</option>
            <option value="3">3 km</option>
            <option value="5" selected>5 km</option>
            <option value="10">10 km</option>
          </select>
        </label>
        <label>Dietary Preference
          <select id="onboardingDiet">
            <option value="VEG">Vegetarian</option>
            <option value="NON_VEG">Non-Vegetarian</option>
            <option value="VEGAN">Vegan</option>
            <option value="ANY" selected>No preference</option>
          </select>
        </label>
        <label>Usually Visit Cafes
          <select id="usuallyVisitWith">
            <option>Alone</option>
            <option selected>With friends</option>
            <option>With colleagues</option>
            <option>With partner</option>
          </select>
        </label>
        <label>Preferred Seating
          <select id="preferredSeating">
            <option>Indoor</option>
            <option>Outdoor</option>
            <option selected>Doesn't matter</option>
          </select>
        </label>
        <label>Music Preference
          <select id="musicPreference">
            <option>Silent</option>
            <option selected>Light music</option>
            <option>Loud / party vibe</option>
          </select>
        </label>
        <label>Lighting Preference
          <select id="lightingPreference">
            <option>Bright</option>
            <option selected>Cozy</option>
            <option>Aesthetic / dim</option>
          </select>
        </label>
        <button id="saveProfileBtn" class="btn alt" type="button">Save Onboarding Profile</button>
        <div id="profileSummary" class="status"></div>
      </div>

      <div class="onboarding-card">
        <h3>Current Visit Context (Dynamic)</h3>
        <label>Purpose of Visit
          <select id="visitPurpose">
            <option>Work / Study</option>
            <option selected>Casual hangout</option>
            <option>Date</option>
            <option>Coffee break</option>
            <option>Meeting</option>
          </select>
        </label>
        <label>Current Budget for this visit
          <select id="visitBudgetRange">
            <option>Low</option>
            <option selected>Medium</option>
            <option>High</option>
          </select>
        </label>
        <label>Travel Distance for this visit
          <select id="visitDistanceKm">
            <option value="1">1 km</option>
            <option value="3">3 km</option>
            <option value="5" selected>5 km</option>
            <option value="10">10 km</option>
          </select>
        </label>
        <label>Time of Visit
          <select id="visitTime">
            <option>Morning</option>
            <option>Afternoon</option>
            <option selected>Evening</option>
            <option>Late night</option>
          </select>
        </label>
        <label>Crowd Tolerance
          <select id="crowdTolerance">
            <option>Quiet</option>
            <option selected>Moderate</option>
            <option>Lively</option>
          </select>
        </label>
      </div>

      <label>Latitude <input id="lat" type="number" step="0.000001" value="18.5204" /></label>
      <label>Longitude <input id="lon" type="number" step="0.000001" value="73.8567" /></label>
      <label>Radius (km) <input id="radius" type="number" step="0.1" value="5" /></label>
      <label>Budget (per person) <input id="budget" type="number" step="1" value="600" /></label>
      <label>Top K <input id="k" type="number" step="1" value="40" /></label>
      <label>Cuisines (comma separated) <input id="cuisines" type="text" value="italian,chinese,indian" /></label>
      <label>Vibe Tags (e.g. darkacademia,plantseverywhere) <input id="vibes" type="text" value="" /></label>
      <label>Acoustic Profile
        <select id="acoustic">
          <option value="">Any</option>
          <option value="Library Quiet">Library Quiet</option>
          <option value="Lo-fi Beats">Lo-fi Beats</option>
          <option value="Active Chatter">Active Chatter</option>
        </select>
      </label>
      <label>Menu Search (dish/drink) <input id="menuQuery" type="text" placeholder="almond croissant" /></label>
      <label>Diet
        <select id="diet">
          <option>ANY</option>
          <option>VEG</option>
          <option>NON_VEG</option>
          <option>VEGAN</option>
        </select>
      </label>
      <label class="check"><input id="indieOnly" type="checkbox" /> Hidden Gems Only (No Chains)</label>

      <div class="weights">
        <h3>Weights</h3>
        <label>Distance (w1) <input id="w1" type="number" step="0.1" value="0.3" /></label>
        <label>Price (w2) <input id="w2" type="number" step="0.1" value="0.2" /></label>
        <label>Rating (w3) <input id="w3" type="number" step="0.1" value="0.2" /></label>
        <label>Cuisine Match (w4) <input id="w4" type="number" step="0.1" value="0.3" /></label>
      </div>

      <button id="searchBtn" class="btn">Find Cafes</button>
      <div id="status" class="status"></div>
    </aside>

    <section class="map-wrap">
      <div id="map"></div>
    </section>

    <section class="results-wrap">
      <h2>Ranked Recommendations</h2>
      <div id="results"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="/app.js"></script>
</body>
</html>
