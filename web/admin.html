<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Cafe Vibe Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth.css" />
</head>
<body class="auth-body">
  <main class="admin-shell">
    <header class="admin-header">
      <div>
        <div class="brand-lockup brand-lockup-admin">
          <img class="brand-logo admin-logo" src="/images/LOGO_DAA.png" alt="Espresso Yourself logo" />
          <div class="brand-copy">
            <p class="eyebrow">Admin Dashboard</p>
            <h1>Platform Overview</h1>
          </div>
        </div>
      </div>
      <div class="cta-row">
        <a class="btn soft-btn" href="/index.html">Open User App</a>
        <button id="adminLogoutBtn" class="btn ghost-btn" type="button">Logout</button>
      </div>
    </header>

    <section class="stats-grid" id="statsGrid"></section>

    <section class="admin-table-card">
      <div class="table-head">
        <h2>Users and Activity</h2>
        <div id="adminStatus" class="status-box inline"></div>
      </div>
      <div class="table-wrap">
        <table id="usersTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Onboarding</th>
              <th>Logins</th>
              <th>Searches</th>
              <th>Preferences</th>
              <th>Last Location</th>
              <th>Last Login</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
